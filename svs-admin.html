<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SVS管理画面</title>
<script src="auth.js"></script>
<style>
body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#111827;color:#f9fafb;}
header{padding:18px;background:#1f2937;border-bottom:1px solid #374151;}
h1{margin:0;font-size:22px;}
main{padding:16px;max-width:1200px;margin:0 auto;}
.card{background:#1f2937;border:1px solid #374151;border-radius:12px;padding:14px;margin-bottom:14px;}
.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
button,select,input{border:none;border-radius:8px;padding:9px 12px;font-size:14px;}
button{background:#2563eb;color:white;cursor:pointer;}
button.danger{background:#dc2626;}
button.warn{background:#f59e0b;color:#111827;}
button.gray{background:#4b5563;}
input,select{background:#111827;color:#f9fafb;border:1px solid #4b5563;}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;}
.stat{background:#111827;border:1px solid #374151;border-radius:10px;padding:12px;}
.stat .label{color:#9ca3af;font-size:13px;}
.stat .num{font-size:24px;font-weight:bold;margin-top:4px;}
table{width:100%;border-collapse:collapse;overflow:hidden;border-radius:10px;}
th,td{border-bottom:1px solid #374151;padding:10px;text-align:left;font-size:14px;vertical-align:middle;}
th{background:#111827;color:#d1d5db;}
tr:hover{background:#111827;}
.badge{display:inline-block;padding:3px 8px;border-radius:999px;font-size:12px;font-weight:bold;}
.join{background:#065f46;color:#d1fae5;}
.maybe{background:#92400e;color:#fef3c7;}
.no{background:#7f1d1d;color:#fee2e2;}
.none{background:#374151;color:#e5e7eb;}
.small{color:#9ca3af;font-size:13px;}
textarea{width:100%;min-height:120px;border-radius:10px;background:#111827;color:#f9fafb;border:1px solid #4b5563;padding:10px;box-sizing:border-box;}
.top-buttons{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;}
.top-buttons a{background:#2563eb;color:white;padding:9px 12px;border-radius:8px;text-decoration:none;font-size:14px;}
.name-list{line-height:1.8;}
@media(max-width:700px){th:nth-child(5),td:nth-child(5),th:nth-child(6),td:nth-child(6){display:none;}}
</style>
</head>

<body>
<header>
  <h1>SVS管理画面</h1>
  <div class="small">参加可否・未回答者・同盟別集計・Tier確認・削除・リセット管理</div>
  <div class="top-buttons">
    <a href="index.html">🏠 TOP</a>
    <a href="svs-form.html">📝 SVS回答</a>
    <a href="box-admin.html">📦 王国箱管理</a>
  </div>
</header>

<main>
<section class="card">
  <h2>集計</h2>
  <div class="stats">
    <div class="stat"><div class="label">登録者</div><div id="totalCount" class="num">0</div></div>
    <div class="stat"><div class="label">参加</div><div id="joinCount" class="num">0</div></div>
    <div class="stat"><div class="label">途中参加</div><div id="maybeCount" class="num">0</div></div>
    <div class="stat"><div class="label">不参加</div><div id="noCount" class="num">0</div></div>
    <div class="stat"><div class="label">未回答</div><div id="unansweredCount" class="num">0</div></div>
  </div>
</section>

<section class="card">
  <h2>Tier集計（参加＋途中参加のみ）</h2>
  <div class="stats">
    <div class="stat"><div class="label">FC5</div><div id="fc5Count" class="num">0</div></div>
    <div class="stat"><div class="label">FC4</div><div id="fc4Count" class="num">0</div></div>
    <div class="stat"><div class="label">FC3</div><div id="fc3Count" class="num">0</div></div>
    <div class="stat"><div class="label">FC2</div><div id="fc2Count" class="num">0</div></div>
    <div class="stat"><div class="label">FC1</div><div id="fc1Count" class="num">0</div></div>
    <div class="stat"><div class="label">T10</div><div id="t10Count" class="num">0</div></div>
    <div class="stat"><div class="label">T9</div><div id="t9Count" class="num">0</div></div>
  </div>
</section>

<section class="card">
  <h2>フィルター</h2>
  <div class="row">
    <button onclick="setStatusFilter('all')">全員</button>
    <button onclick="setStatusFilter('参加')">参加</button>
    <button onclick="setStatusFilter('途中参加')">途中参加</button>
    <button onclick="setStatusFilter('不参加')">不参加</button>
    <button onclick="setStatusFilter('未回答')" class="warn">未回答</button>

    <select id="allianceFilter" onchange="render()"><option value="all">全同盟</option></select>

    <select id="tierFilter" onchange="render()">
      <option value="all">全Tier</option>
      <option value="FC5">FC5</option>
      <option value="FC4">FC4</option>
      <option value="FC3">FC3</option>
      <option value="FC2">FC2</option>
      <option value="FC1">FC1</option>
      <option value="T10">T10</option>
      <option value="T9">T9</option>
      <option value="未分類">未分類</option>
    </select>

    <input id="searchInput" type="text" placeholder="名前・同盟で検索" oninput="render()">

    <button class="gray" onclick="loadData()">再読み込み</button>
    <button onclick="copyVisibleNames()">表示中の名前コピー</button>
    <button class="danger" onclick="resetParticipation()">参加可否リセット</button>
  </div>
  <p class="small">※ 削除と参加可否リセットはパスワード確認あり。通常は5分キャッシュで読み取り回数を節約します。</p>
  <p id="cacheInfo" class="small">最終取得：未取得</p>
</section>

<section class="card">
  <h2>表示中一覧 <span id="visibleCount" class="small"></span></h2>
  <table>
    <thead>
      <tr>
        <th>名前</th>
        <th>同盟</th>
        <th>参加可否</th>
        <th>最低Tier</th>
        <th>兵士</th>
        <th>メモ</th>
        <th>操作</th>
      </tr>
    </thead>
    <tbody id="playerTable"></tbody>
  </table>
</section>

<section class="card"><h2>同盟別未回答者</h2><div id="unansweredByAlliance"></div></section>
<section class="card"><h2>Tier別 参加者名</h2><div id="tierNames" class="name-list"></div></section>
<section class="card"><h2>コピー用</h2><textarea id="copyArea" readonly placeholder="コピー内容がここに出ます"></textarea></section>
</main>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getCachedCollection, clearFirestoreCache, getCacheAgeText } from "./firestore-cache.js";

const firebaseConfig = {
  apiKey: "AIzaSyD826LkOY5iKXH04agBlc9IPHpeBO4C6uM",
  authDomain: "svsv-54551.firebaseapp.com",
  projectId: "svsv-54551",
  storageBucket: "svsv-54551.firebasestorage.app",
  messagingSenderId: "948158589591",
  appId: "1:948158589591:web:53b3a4430d0629492597d2"
};

const ADMIN_PASSWORD = "1234";
const COLLECTION_NAME = "svsResponses";

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let allPlayers = [];
let currentStatusFilter = "all";

window.loadData = () => loadData(true);
window.setStatusFilter = setStatusFilter;
window.copyVisibleNames = copyVisibleNames;
window.deletePlayer = deletePlayer;
window.resetParticipation = resetParticipation;
window.render = render;

function getStatus(player){return player.status || player.participation || "未回答";}
function getAlliance(player){return player.alliance || player.allianceName || "-";}
function getName(player){return player.playerName || player.name || player.gameName || "名前なし";}
function getMemo(player){return player.memo || player.note || player.comment || "";}
function isActive(player){const s=getStatus(player);return s==="参加"||s==="途中参加";}

function getTierValue(p,type){
  if(p[`fc5${type}`]) return 5;
  if(p[`fc4${type}`]) return 4;
  if(p[`fc3${type}`]) return 3;
  if(p[`fc2${type}`]) return 2;
  if(p[`fc1${type}`]) return 1;
  if(p[`t10${type}`]) return 0;
  if(p[`t9${type}`]) return -1;

  const key = type === "Archer" ? "archer" : type.toLowerCase();
  const oldValue = p[`${key}Tier`] || p[key] || "";
  if(oldValue === "FC5") return 5;
  if(oldValue === "FC4") return 4;
  if(oldValue === "FC3") return 3;
  if(oldValue === "FC2") return 2;
  if(oldValue === "FC1") return 1;
  if(oldValue === "T10") return 0;
  if(oldValue === "T9") return -1;
  return -2;
}

function getLowestTier(p){
  const minTier = Math.min(getTierValue(p,"Shield"),getTierValue(p,"Spear"),getTierValue(p,"Archer"));
  if(minTier === 5) return "FC5";
  if(minTier === 4) return "FC4";
  if(minTier === 3) return "FC3";
  if(minTier === 2) return "FC2";
  if(minTier === 1) return "FC1";
  if(minTier === 0) return "T10";
  if(minTier === -1) return "T9";
  return "未分類";
}

function getOneTroopTier(p,type){
  if(p[`fc5${type}`]) return "FC5";
  if(p[`fc4${type}`]) return "FC4";
  if(p[`fc3${type}`]) return "FC3";
  if(p[`fc2${type}`]) return "FC2";
  if(p[`fc1${type}`]) return "FC1";
  if(p[`t10${type}`]) return "T10";
  if(p[`t9${type}`]) return "T9";

  const key = type === "Archer" ? "archer" : type.toLowerCase();
  return p[`${key}Tier`] || p[key] || "-";
}

function getTroops(player){
  return `盾:${getOneTroopTier(player,"Shield")} / 槍:${getOneTroopTier(player,"Spear")} / 弓:${getOneTroopTier(player,"Archer")}`;
}

function statusBadge(status){
  if(status==="参加") return `<span class="badge join">参加</span>`;
  if(status==="途中参加") return `<span class="badge maybe">途中参加</span>`;
  if(status==="不参加") return `<span class="badge no">不参加</span>`;
  return `<span class="badge none">未回答</span>`;
}

function checkAdminPassword(){
  const input=prompt("管理パスワードを入力してください");
  if(input!==ADMIN_PASSWORD){alert("パスワードが違います");return false;}
  return true;
}

async function loadData(forceReload=false){
  if(forceReload){
    clearFirestoreCache(COLLECTION_NAME);
  }

  allPlayers = await getCachedCollection(db, COLLECTION_NAME, 300000);

  buildAllianceFilter();
  render();

  const cacheInfo = document.getElementById("cacheInfo");
  if(cacheInfo){
    cacheInfo.textContent = "最終取得：" + getCacheAgeText(COLLECTION_NAME);
  }
}

function buildAllianceFilter(){
  const select=document.getElementById("allianceFilter");
  const current=select.value;
  const alliances=[...new Set(allPlayers.map(getAlliance))].filter(x=>x&&x!=="-").sort();

  select.innerHTML=`<option value="all">全同盟</option>`;
  alliances.forEach(a=>{
    const option=document.createElement("option");
    option.value=a;
    option.textContent=a;
    select.appendChild(option);
  });

  if([...select.options].some(o=>o.value===current)) select.value=current;
}

function setStatusFilter(status){
  currentStatusFilter=status;
  render();
}

function getFilteredPlayers(){
  const allianceFilter=document.getElementById("allianceFilter").value;
  const tierFilter=document.getElementById("tierFilter").value;
  const search=document.getElementById("searchInput").value.trim().toLowerCase();

  return allPlayers.filter(p=>{
    const status=getStatus(p);
    const alliance=getAlliance(p);
    const name=getName(p);
    const tier=getLowestTier(p);

    if(currentStatusFilter!=="all"&&status!==currentStatusFilter) return false;
    if(allianceFilter!=="all"&&alliance!==allianceFilter) return false;
    if(tierFilter!=="all"&&tier!==tierFilter) return false;

    if(search){
      const text=`${name} ${alliance}`.toLowerCase();
      if(!text.includes(search)) return false;
    }

    return true;
  });
}

function render(){
  renderStats();
  renderTable();
  renderUnansweredByAlliance();
  renderTierNames();
}

function renderStats(){
  const total=allPlayers.length;
  const join=allPlayers.filter(p=>getStatus(p)==="参加").length;
  const maybe=allPlayers.filter(p=>getStatus(p)==="途中参加").length;
  const no=allPlayers.filter(p=>getStatus(p)==="不参加").length;
  const unanswered=allPlayers.filter(p=>getStatus(p)==="未回答").length;
  const activePlayers=allPlayers.filter(isActive);

  document.getElementById("totalCount").textContent=total;
  document.getElementById("joinCount").textContent=join;
  document.getElementById("maybeCount").textContent=maybe;
  document.getElementById("noCount").textContent=no;
  document.getElementById("unansweredCount").textContent=unanswered;

  document.getElementById("fc5Count").textContent=activePlayers.filter(p=>getLowestTier(p)==="FC5").length;
  document.getElementById("fc4Count").textContent=activePlayers.filter(p=>getLowestTier(p)==="FC4").length;
  document.getElementById("fc3Count").textContent=activePlayers.filter(p=>getLowestTier(p)==="FC3").length;
  document.getElementById("fc2Count").textContent=activePlayers.filter(p=>getLowestTier(p)==="FC2").length;
  document.getElementById("fc1Count").textContent=activePlayers.filter(p=>getLowestTier(p)==="FC1").length;
  document.getElementById("t10Count").textContent=activePlayers.filter(p=>getLowestTier(p)==="T10").length;
  document.getElementById("t9Count").textContent=activePlayers.filter(p=>getLowestTier(p)==="T9").length;
}

function renderTable(){
  const tbody=document.getElementById("playerTable");
  const players=getFilteredPlayers();
  document.getElementById("visibleCount").textContent=`(${players.length}人)`;
  tbody.innerHTML="";

  if(players.length===0){
    tbody.innerHTML=`<tr><td colspan="7">該当者なし</td></tr>`;
    return;
  }

  players.forEach(p=>{
    const tr=document.createElement("tr");
    const status=getStatus(p);
    const mark=status==="途中参加"?"※":"";

    tr.innerHTML=`
      <td>${escapeHtml(mark+getName(p))}</td>
      <td>${escapeHtml(getAlliance(p))}</td>
      <td>${statusBadge(status)}</td>
      <td>${escapeHtml(getLowestTier(p))}</td>
      <td>${escapeHtml(getTroops(p))}</td>
      <td>${escapeHtml(getMemo(p))}</td>
      <td><button class="danger" onclick="deletePlayer('${p.id}')">削除</button></td>
    `;

    tbody.appendChild(tr);
  });
}

function renderUnansweredByAlliance(){
  const area=document.getElementById("unansweredByAlliance");
  const unanswered=allPlayers.filter(p=>getStatus(p)==="未回答");
  const map={};

  unanswered.forEach(p=>{
    const alliance=getAlliance(p);
    if(!map[alliance]) map[alliance]=[];
    map[alliance].push(getName(p));
  });

  const alliances=Object.keys(map).sort();

  if(alliances.length===0){
    area.innerHTML=`<p class="small">未回答者はいません。</p>`;
    return;
  }

  area.innerHTML=alliances.map(a=>`
    <div class="card">
      <strong>${escapeHtml(a)}：${map[a].length}人</strong>
      <div class="small">${escapeHtml(map[a].join("、"))}</div>
    </div>
  `).join("");
}

function renderTierNames(){
  const area=document.getElementById("tierNames");
  const activePlayers=allPlayers.filter(isActive);
  const tiers=["FC5","FC4","FC3","FC2","FC1","T10","T9"];

  area.innerHTML=tiers.map(tier=>{
    const members=activePlayers.filter(p=>getLowestTier(p)===tier);
    const names=members.map(p=>{
      const mark=getStatus(p)==="途中参加"?"※":"";
      return mark+getName(p);
    }).join("、")||"該当なし";

    return `
      <div class="card">
        <strong>${tier}：${members.length}人</strong>
        <div class="small">${escapeHtml(names)}</div>
      </div>
    `;
  }).join("");
}

function copyVisibleNames(){
  const players=getFilteredPlayers();
  const text=players.map(p=>{
    const mark=getStatus(p)==="途中参加"?"※":"";
    return `${getAlliance(p)} ${mark}${getName(p)}（${getStatus(p)} / ${getLowestTier(p)}）`;
  }).join("\\n");

  document.getElementById("copyArea").value=text;

  navigator.clipboard.writeText(text)
    .then(()=>alert("表示中の名前をコピーしました"))
    .catch(()=>alert("コピー欄に出しました。手動でコピーしてください"));
}

async function deletePlayer(id){
  if(!checkAdminPassword()) return;
  if(!confirm("この回答を削除します。よろしいですか？")) return;
  await deleteDoc(doc(db,COLLECTION_NAME,id));
  clearFirestoreCache(COLLECTION_NAME);
  alert("削除しました");
  await loadData(true);
}

async function resetParticipation(){
  if(!checkAdminPassword()) return;
  if(!confirm("参加可否を全員「未回答」に戻します。よろしいですか？")) return;

  const targets=allPlayers.filter(p=>getStatus(p)!=="未回答");

  for(const p of targets){
    await updateDoc(doc(db,COLLECTION_NAME,p.id),{
      status:"未回答",
      participation:"",
      updatedAt:new Date().toISOString()
    });
  }

  clearFirestoreCache(COLLECTION_NAME);
  alert(`参加可否をリセットしました：${targets.length}件`);
  await loadData(true);
}

function escapeHtml(value){
  return String(value??"")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

loadData().catch(error=>{
  console.error(error);
  alert("読み込みエラーです。Firebase設定とコレクション名を確認してください。");
});
</script>
</body>
</html>
