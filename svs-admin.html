<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>SVS管理画面</title>

<style>

body{

margin:0;
padding:20px;
background:#071a2d;
color:white;
font-family:sans-serif;

}

h1{

text-align:center;
color:#00d4ff;
margin-bottom:30px;

}

h2{

color:#00d4ff;
margin-top:40px;

}

.section{

margin-bottom:40px;

}

.player-grid{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(230px,1fr));

gap:15px;

}

.player-card{

background:#132b45;
padding:15px;
border-radius:12px;
box-shadow:0 0 10px rgba(0,0,0,0.3);

}

.player-card h3{

margin-top:0;
color:#00d4ff;

}

.player-card p{

margin:6px 0;

}

.player-card select{

width:100%;
padding:8px;
margin-top:10px;
border:none;
border-radius:8px;

}

.player-card button{

width:100%;
padding:10px;
margin-top:10px;
background:#ff4444;
color:white;
border:none;
border-radius:8px;
font-weight:bold;

}

.top-buttons{

display:flex;
justify-content:center;
gap:10px;
margin-bottom:20px;

}

.top-buttons a{

background:#00d4ff;
color:black;
padding:10px 15px;
border-radius:10px;
text-decoration:none;
font-weight:bold;

}

</style>

</head>

<body>

<div class="top-buttons">

<a href="index.html">🏠 TOP</a>

<a href="svs-form.html">📝 回答</a>

</div>

<h1>📋 SVS管理画面</h1>

<div class="section">

<h2>🔥 全FC3</h2>

<div class="player-grid"
id="allFC3"></div>

</div>

<div class="section">

<h2>🔥 全FC2</h2>

<div class="player-grid"
id="allFC2"></div>

</div>

<div class="section">

<h2>🔥 全FC1</h2>

<div class="player-grid"
id="allFC1"></div>

</div>

<div class="section">

<h2>🔥 全T10</h2>

<div class="player-grid"
id="allT10"></div>

</div>

<div class="section">

<h2>⚔ 本戦A</h2>

<div class="player-grid"
id="mainA"></div>

</div>

<div class="section">

<h2>⚔ 本戦B</h2>

<div class="player-grid"
id="mainB"></div>

</div>

<div class="section">

<h2>🛡 支援1</h2>

<div class="player-grid"
id="support1"></div>

</div>

<div class="section">

<h2>🛡 支援2</h2>

<div class="player-grid"
id="support2"></div>

</div>

<div class="section">

<h2>⏳ 待機</h2>

<div class="player-grid"
id="waiting"></div>

</div>

<script type="module">

import {
initializeApp
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
getFirestore,
collection,
getDocs,
doc,
updateDoc,
deleteDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {

apiKey:
"AIzaSyD826LkOY5iKXH04agBlc9IPHpeBO4C6uM",

authDomain:
"svsv-54551.firebaseapp.com",

projectId:
"svsv-54551",

storageBucket:
"svsv-54551.firebasestorage.app",

messagingSenderId:
"948158589591",

appId:
"1:948158589591:web:53b3a4430d0629492597d2"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

let allData = [];

async function loadData(){

const snapshot = await getDocs(
collection(db,"svsResponses")
);

allData = [];

snapshot.forEach(d => {

allData.push({
id:d.id,
...d.data()
});

});

renderAll();

}

function getLowestTier(p){

const shield =

p.fc3Shield ? 3 :

p.fc2Shield ? 2 :

p.fc1Shield ? 1 :

p.t10Shield ? 0 :

-1;

const spear =

p.fc3Spear ? 3 :

p.fc2Spear ? 2 :

p.fc1Spear ? 1 :

p.t10Spear ? 0 :

-1;

const archer =

p.fc3Archer ? 3 :

p.fc2Archer ? 2 :

p.fc1Archer ? 1 :

p.t10Archer ? 0 :

-1;

const minTier = Math.min(
shield,
spear,
archer
);

if(minTier === 3){
return "FC3";
}

if(minTier === 2){
return "FC2";
}

if(minTier === 1){
return "FC1";
}

if(minTier === 0){
return "T10";
}

return "未分類";

}

function renderPlayers(players,id){

const div = document.getElementById(id);

if(!div) return;

div.innerHTML = "";

players.forEach(p => {

div.innerHTML += `

<div class="player-card">

<h3>${p.playerName || "-"}</h3>

<p>⚔ 戦力:
${p.power || "-"}</p>

<p>🏰 サーバー:
${p.server || "-"}</p>

<p>🛡 同盟:
${p.alliance || "-"}</p>

<p>🔥 最低Tier:
${getLowestTier(p)}</p>

<select onchange="changeGroup('${p.id}',this.value)">

<option value="">未設定</option>

<option value="本戦A"
${p.group==="本戦A"?"selected":""}>
本戦A
</option>

<option value="本戦B"
${p.group==="本戦B"?"selected":""}>
本戦B
</option>

<option value="支援1"
${p.group==="支援1"?"selected":""}>
支援1
</option>

<option value="支援2"
${p.group==="支援2"?"selected":""}>
支援2
</option>

<option value="待機"
${p.group==="待機"?"selected":""}>
待機
</option>

</select>

<button onclick="removePlayer('${p.id}')">

削除

</button>

</div>

`;

});

}

window.changeGroup = async function(id,group){

await updateDoc(
doc(db,"svsResponses",id),
{
group:group
}
);

loadData();

}

window.removePlayer = async function(id){

if(!confirm("削除しますか？"))
return;

await deleteDoc(
doc(db,"svsResponses",id)
);

loadData();

}

function renderAll(){

const allFC3 =
allData.filter(
x => getLowestTier(x)==="FC3"
);

const allFC2 =
allData.filter(
x => getLowestTier(x)==="FC2"
);

const allFC1 =
allData.filter(
x => getLowestTier(x)==="FC1"
);

const allT10 =
allData.filter(
x => getLowestTier(x)==="T10"
);

const mainA =
allData.filter(
x => x.group==="本戦A"
);

const mainB =
allData.filter(
x => x.group==="本戦B"
);

const support1 =
allData.filter(
x => x.group==="支援1"
);

const support2 =
allData.filter(
x => x.group==="支援2"
);

const waiting =
allData.filter(
x => x.group==="待機"
);

renderPlayers(allFC3,"allFC3");

renderPlayers(allFC2,"allFC2");

renderPlayers(allFC1,"allFC1");

renderPlayers(allT10,"allT10");

renderPlayers(mainA,"mainA");

renderPlayers(mainB,"mainB");

renderPlayers(support1,"support1");

renderPlayers(support2,"support2");

renderPlayers(waiting,"waiting");

}

loadData();

</script>

</body>
</html>
