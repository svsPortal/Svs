<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>王国箱 振り分け管理</title>
<script src="auth.js"></script>

<style>
:root{
  --bg:#071a2d;
  --panel:#132b45;
  --panel2:#173754;
  --panel3:#10263d;
  --line:#35516c;
  --accent:#00d4ff;
  --text:#ffffff;
  --muted:#d7e2ec;
  --warn:#ffdd55;
  --danger:#ff6666;
  --ok:#66ff99;
}
*{box-sizing:border-box;}
body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  padding:12px;
}
h1,h2,h3{
  color:var(--accent);
  text-align:center;
}
h1{
  font-size:24px;
  margin:14px 0;
}
h2{
  font-size:19px;
  margin:8px 0 14px;
}
h3{
  font-size:15px;
  margin:16px 0 8px;
}
.box,.filter,.summary{
  max-width:1100px;
  margin:12px auto;
  background:var(--panel);
  padding:14px;
  border-radius:14px;
  box-shadow:0 6px 18px rgba(0,0,0,.20);
}
.filter{
  position:relative;
}
.filter-row{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  justify-content:center;
  margin:8px 0;
}
label{
  background:var(--panel2);
  padding:8px 10px;
  border-radius:999px;
  font-size:13px;
  line-height:1;
}
input,select,button{
  padding:10px;
  margin-top:8px;
  border:none;
  border-radius:10px;
  box-sizing:border-box;
  font-size:14px;
}
input[type="text"],select{
  width:100%;
  background:var(--bg);
  color:white;
  border:1px solid var(--line);
}
button{
  background:var(--accent);
  color:black;
  font-weight:bold;
  cursor:pointer;
  width:100%;
}
button:active{
  transform:scale(.99);
}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:10px;
}
.card{
  background:var(--panel2);
  padding:12px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,.06);
}
.card h3{
  margin:0 0 8px;
  color:var(--accent);
  text-align:left;
  font-size:17px;
}
.card p{
  margin:5px 0;
  font-size:13px;
  color:var(--muted);
}
.card-top{
  display:grid;
  grid-template-columns:auto 1fr;
  gap:8px;
  align-items:start;
}
.card-name-line{
  display:flex;
  flex-wrap:wrap;
  align-items:center;
  gap:6px;
}
.badge{
  display:inline-block;
  padding:3px 7px;
  border-radius:999px;
  font-size:12px;
  font-weight:bold;
  line-height:1.2;
}
.badge-fc5{background:#7c3aed;color:#ede9fe;}
.badge-fc4{background:#b91c1c;color:#fee2e2;}
.badge-fc3{background:#0f766e;color:#d1fae5;}
.badge-fc2{background:#854d0e;color:#fef3c7;}
.badge-fc1{background:#9a3412;color:#ffedd5;}
.badge-t10{background:#1d4ed8;color:#dbeafe;}
.badge-t9{background:#4b5563;color:#f9fafb;}
.badge-none{background:#374151;color:#e5e7eb;}
.badge-rally{background:#facc15;color:#111827;}
.badge-pet{background:#0ea5e9;color:white;}
.tier-line{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:6px;
  margin:8px 0;
}
.tier-pill{
  background:var(--panel3);
  border:1px solid var(--line);
  border-radius:10px;
  padding:7px 6px;
  text-align:center;
  font-size:12px;
  line-height:1.3;
}
.tier-pill strong{
  display:block;
  color:white;
  font-size:14px;
}
.meta-line{
  display:flex;
  flex-wrap:wrap;
  gap:5px;
  margin:6px 0;
}
.bulk{
  background:#ffaa00;
  color:black;
}
.full{
  color:var(--danger);
  font-weight:bold;
}
.ok{
  color:var(--ok);
}
.warn{
  color:var(--warn);
  font-weight:bold;
}
.box-list{
  background:var(--panel2);
  padding:12px;
  border-radius:12px;
  margin-top:10px;
  line-height:1.8;
}
.box-list h3{
  display:flex;
  justify-content:space-between;
  gap:8px;
  align-items:center;
  text-align:left;
  margin:0 0 8px;
  background:var(--panel3);
  padding:10px;
  border-radius:10px;
}
.box-list p{
  margin:6px 0;
  color:var(--muted);
  font-size:13px;
}
.box-member-list{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  line-height:1.4;
}
.box-member-chip{
  background:var(--panel3);
  border:1px solid var(--line);
  border-radius:999px;
  padding:5px 8px;
  font-size:12px;
}
.top-buttons{
  display:flex;
  justify-content:center;
  gap:8px;
  flex-wrap:wrap;
  max-width:1100px;
  margin:0 auto 10px;
}
.top-buttons a{
  background:var(--accent);
  color:black;
  padding:9px 12px;
  border-radius:10px;
  text-decoration:none;
  font-weight:bold;
  font-size:13px;
}
details{
  background:var(--panel3);
  padding:9px;
  border-radius:10px;
  margin-top:8px;
}
summary{
  cursor:pointer;
  color:var(--accent);
  font-weight:bold;
  font-size:13px;
}
hr{
  border:0;
  border-top:1px solid var(--line);
  margin:10px 0;
}
.small{
  font-size:12px;
  color:#ddd;
}
.card select{
  margin-top:4px;
}
.card label{
  border-radius:10px;
  display:inline-flex;
  align-items:center;
  gap:5px;
}
.card label input{
  margin:0;
}
@media(max-width:640px){
  body{
    padding:8px;
  }
  h1{
    font-size:21px;
  }
  .box,.filter,.summary{
    padding:10px;
    margin:10px auto;
    border-radius:12px;
  }
  .filter-row{
    justify-content:flex-start;
    gap:6px;
  }
  label{
    font-size:12px;
    padding:7px 9px;
  }
  .grid{
    grid-template-columns:1fr;
  }
  .top-buttons{
    justify-content:stretch;
  }
  .top-buttons a{
    flex:1 1 30%;
    text-align:center;
    font-size:12px;
    padding:8px;
  }
  .card{
    padding:10px;
  }
  .card h3{
    font-size:16px;
  }
  .tier-line{
    grid-template-columns:repeat(3,1fr);
  }
  .box-list h3{
    font-size:15px;
  }
}
</style>
</head>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
  getFirestore,
  doc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import { getCachedCollection, clearFirestoreCache, getCacheAgeText } from "./firestore-cache.js";

const firebaseConfig = {
  apiKey: "AIzaSyD826LkOY5iKXH04agBlc9IPHpeBO4C6uM",
  authDomain: "svsv-54551.firebaseapp.com",
  projectId: "svsv-54551",
  storageBucket: "svsv-54551.firebasestorage.app",
  messagingSenderId: "948158589591",
  appId: "1:948158589591:web:53b3a4430d0629492597d2"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let svsData = [];
let rallyMap = {};
let selectedIds = new Set();

const BOXES = [
  "未振り分け",
  "王国1箱",
  "王国2箱",
  "王国3箱",
  "王国4箱",
  "王国5箱"
];

window.loadData = loadData;

async function loadData(forceReload=false){
  svsData = [];
  rallyMap = {};

  if(forceReload){
    clearFirestoreCache("svsResponses");
    clearFirestoreCache("rallyResponses");
  }

  svsData = await getCachedCollection(db, "svsResponses", 300000);
  const rallyData = await getCachedCollection(db, "rallyResponses", 300000);

  rallyData.forEach(data=>{
    const name = data.playerName || data.id;
    rallyMap[name] = data;
  });

  applyFilters();
  renderBoxSummary();

  const cacheInfo = document.getElementById("cacheInfo");
  if(cacheInfo){
    cacheInfo.textContent =
      "SVS：" + getCacheAgeText("svsResponses") +
      " / 集結：" + getCacheAgeText("rallyResponses");
  }
}

function getRally(p){
  return rallyMap[p.playerName] || {};
}

function petsList(p){
  const rally = getRally(p);
  return Array.isArray(rally.pets) ? rally.pets : [];
}

function getRallyCapacity(p){
  const rally = getRally(p);
  return Number(rally.rallyCapacity || 0);
}

function getTierValue(p,type){
  if(p[`fc5${type}`]) return 5;
  if(p[`fc4${type}`]) return 4;
  if(p[`fc3${type}`]) return 3;
  if(p[`fc2${type}`]) return 2;
  if(p[`fc1${type}`]) return 1;
  if(p[`t10${type}`]) return 0;
  if(p[`t9${type}`]) return -1;

  const key = type === "Archer" ? "archer" : type.toLowerCase();
  const oldValue = p[`${key}Tier`] || p[key] || "";
  if(oldValue === "FC5") return 5;
  if(oldValue === "FC4") return 4;
  if(oldValue === "FC3") return 3;
  if(oldValue === "FC2") return 2;
  if(oldValue === "FC1") return 1;
  if(oldValue === "T10") return 0;
  if(oldValue === "T9") return -1;
  return -2;
}

function getLowestTier(p){
  const minTier = Math.min(
    getTierValue(p,"Shield"),
    getTierValue(p,"Spear"),
    getTierValue(p,"Archer")
  );

  if(minTier === 5) return "FC5";
  if(minTier === 4) return "FC4";
  if(minTier === 3) return "FC3";
  if(minTier === 2) return "FC2";
  if(minTier === 1) return "FC1";
  if(minTier === 0) return "T10";
  if(minTier === -1) return "T9";
  return "未分類";
}

function getOneTroopTier(p,type){
  if(p[`fc5${type}`]) return "FC5";
  if(p[`fc4${type}`]) return "FC4";
  if(p[`fc3${type}`]) return "FC3";
  if(p[`fc2${type}`]) return "FC2";
  if(p[`fc1${type}`]) return "FC1";
  if(p[`t10${type}`]) return "T10";
  if(p[`t9${type}`]) return "T9";

  const key = type === "Archer" ? "archer" : type.toLowerCase();

  return p[`${key}Tier`] || p[key] || "-";
}

function tierRank(tier){
  if(tier === "FC5") return 7;
  if(tier === "FC4") return 6;
  if(tier === "FC3") return 5;
  if(tier === "FC2") return 4;
  if(tier === "FC1") return 3;
  if(tier === "T10") return 2;
  if(tier === "T9") return 1;
  return 0;
}


function tierBadgeClass(tier){
  if(tier === "FC5") return "badge-fc5";
  if(tier === "FC4") return "badge-fc4";
  if(tier === "FC3") return "badge-fc3";
  if(tier === "FC2") return "badge-fc2";
  if(tier === "FC1") return "badge-fc1";
  if(tier === "T10") return "badge-t10";
  if(tier === "T9") return "badge-t9";
  return "badge-none";
}

function checkedValues(parentId){
  return [...document.querySelectorAll(`#${parentId} input:checked`)]
    .map(x => x.value);
}

function is555(a,b,c){
  return Number(a) === 5 && Number(b) === 5 && Number(c) === 5;
}

function is5(a){
  return Number(a) === 5;
}

function hasPetSkillAtLeast(p, level){
  return petsList(p).some(pet => Number(pet.skillLevel || 0) >= level);
}

function hasPetName(p, name){
  return petsList(p).some(pet => pet.name === name);
}

function petSummary(p){
  const pets = petsList(p);

  if(pets.length === 0){
    return "ペット登録なし";
  }

  return pets.map(pet=>
    `${pet.name || "-"} Lv${pet.skillLevel || 0}`
  ).join("、");
}

function hasRallyCondition(p){
  const rally = getRally(p);

  if(document.getElementById("filterCanRally").checked &&
     rally.canRally !== "可能"){
    return false;
  }

  if(document.getElementById("filterLogan555").checked &&
     !is555(rally.loganSkill1,rally.loganSkill2,rally.loganSkill3)){
    return false;
  }

  if(document.getElementById("filterLoganWeapon10").checked &&
     Number(rally.loganWeapon || 0) < 10){
    return false;
  }

  if(document.getElementById("filterGreg555").checked &&
     !is555(rally.gregSkill1,rally.gregSkill2,rally.gregSkill3)){
    return false;
  }

  if(document.getElementById("filterGregWeapon10").checked &&
     Number(rally.gregWeapon || 0) < 10){
    return false;
  }

  if(document.getElementById("filterJeronimo555").checked &&
     !is555(rally.jeronimoSkill1,rally.jeronimoSkill2,rally.jeronimoSkill3)){
    return false;
  }

  if(document.getElementById("filterJeronimoWeapon10").checked &&
     Number(rally.jeronimoWeapon || 0) < 10){
    return false;
  }

  if(document.getElementById("filterJessie5").checked &&
     !is5(rally.jessieSkill1)){
    return false;
  }

  if(document.getElementById("filterPatrick5").checked &&
     !is5(rally.patrickSkill1)){
    return false;
  }

  if(document.getElementById("filterSoyoon5").checked &&
     !is5(rally.soyoonSkill1)){
    return false;
  }

  if(document.getElementById("filterRinsetsu5").checked &&
     !is5(rally.rinsetsuSkill1)){
    return false;
  }

  if(document.getElementById("filterHasPet").checked &&
     petsList(p).length === 0){
    return false;
  }

  if(document.getElementById("filterPetLv10").checked &&
     !hasPetSkillAtLeast(p,10)){
    return false;
  }

  const petName =
    document.getElementById("petNameFilter").value;

  if(petName && !hasPetName(p,petName)){
    return false;
  }

  const petSkill =
    Number(document.getElementById("petSkillFilter").value || 0);

  if(petSkill > 0 && !hasPetSkillAtLeast(p,petSkill)){
    return false;
  }

  return true;
}

function sortResult(list){
  const sortType = document.getElementById("sortType").value;

  list.sort((a,b)=>{
    if(sortType === "capacityDesc"){
      return getRallyCapacity(b) - getRallyCapacity(a);
    }

    if(sortType === "capacityAsc"){
      return getRallyCapacity(a) - getRallyCapacity(b);
    }

    if(sortType === "tier"){
      return tierRank(getLowestTier(b)) - tierRank(getLowestTier(a));
    }

    if(sortType === "alliance"){
      return (a.alliance || "").localeCompare(b.alliance || "","ja");
    }

    if(sortType === "name"){
      return (a.playerName || "").localeCompare(b.playerName || "","ja");
    }

    return 0;
  });

  return list;
}

window.applyFilters = function(){
  const alliances = checkedValues("allianceFilters");
  const tiers = checkedValues("tierFilters");
  const statuses = checkedValues("statusFilters");
  const boxes = checkedValues("boxFilters");
  const keyword = document.getElementById("searchName").value.trim().toLowerCase();

  let result = svsData.filter(p=>{
    const alliance = p.alliance || "";
    const tier = getLowestTier(p);
    const status = p.status || "";
    const box = p.kingdomBox || "未振り分け";
    const name = (p.playerName || "").toLowerCase();

    if(!alliances.includes(alliance)) return false;
    if(!tiers.includes(tier)) return false;
    if(!statuses.includes(status)) return false;
    if(!boxes.includes(box)) return false;
    if(keyword && !name.includes(keyword)) return false;
    if(!hasRallyCondition(p)) return false;

    return true;
  });

  result = sortResult(result);

  renderResults(result);
}

window.resetFilters = function(){
  document.querySelectorAll("#allianceFilters input,#tierFilters input,#statusFilters input,#boxFilters input").forEach(x=>{
    x.checked = true;
  });

  document.querySelectorAll(".filter input[id^='filter']").forEach(x=>{
    x.checked = false;
  });

  document.getElementById("petNameFilter").value = "";
  document.getElementById("petSkillFilter").value = "";
  document.getElementById("searchName").value = "";
  document.getElementById("sortType").value = "capacityDesc";

  applyFilters();
}

function renderResults(list){
  document.getElementById("resultTitle").textContent =
    "検索結果：" + list.length + "人";

  const div = document.getElementById("resultArea");

  if(list.length === 0){
    div.innerHTML = "<p>該当なし</p>";
    return;
  }

  div.innerHTML = list.map(p => playerCard(p)).join("");
}

function playerCard(p){
  const rally = getRally(p);
  const box = p.kingdomBox || "未振り分け";
  const tier = getLowestTier(p);
  const mark = p.status === "途中参加" ? "※" : "";
  const checked = selectedIds.has(p.id) ? "checked" : "";
  const rallyBadge = rally.canRally === "可能" ? `<span class="badge badge-rally">👑集結主</span>` : "";
  const petBadge = petsList(p).length > 0 ? `<span class="badge badge-pet">🐾${petSummary(p)}</span>` : "";
  const cap = Number(rally.rallyCapacity || 0).toLocaleString();

  return `
    <div class="card">
      <div class="card-top">
        <label>
          <input type="checkbox" ${checked} onchange="toggleSelect('${p.id}', this.checked)">
          選択
        </label>

        <div>
          <div class="card-name-line">
            <h3>${mark}${p.playerName || "-"}</h3>
            <span class="badge ${tierBadgeClass(tier)}">${tier}</span>
            ${rallyBadge}
          </div>

          <div class="meta-line">
            <span class="badge badge-none">${p.alliance || "-"}</span>
            <span class="badge badge-none">${p.status || "-"}</span>
            <span class="badge badge-none">容量 ${cap}</span>
            ${petBadge}
          </div>
        </div>
      </div>

      <div class="tier-line">
        <div class="tier-pill">🛡盾<strong>${getOneTroopTier(p,"Shield")}</strong></div>
        <div class="tier-pill">⚔槍<strong>${getOneTroopTier(p,"Spear")}</strong></div>
        <div class="tier-pill">🏹弓<strong>${getOneTroopTier(p,"Archer")}</strong></div>
      </div>

      <p>箱：</p>
      <select onchange="changeBox('${p.id}', this.value)">
        ${BOXES.map(b=>`
          <option value="${b}" ${box===b?"selected":""}>${b}</option>
        `).join("")}
      </select>

      <details>
        <summary>英雄詳細を見る</summary>

        <p>ローガン：${rally.loganSkill1 || 0}-${rally.loganSkill2 || 0}-${rally.loganSkill3 || 0} / 専用${rally.loganWeapon || 0}</p>
        <p>グレッグ：${rally.gregSkill1 || 0}-${rally.gregSkill2 || 0}-${rally.gregSkill3 || 0} / 専用${rally.gregWeapon || 0}</p>
        <p>ジェロニモ：${rally.jeronimoSkill1 || 0}-${rally.jeronimoSkill2 || 0}-${rally.jeronimoSkill3 || 0} / 専用${rally.jeronimoWeapon || 0}</p>

        <hr>

        <p>ジェシー：${rally.jessieSkill1 || 0}</p>
        <p>パトリック：${rally.patrickSkill1 || 0}</p>
        <p>ソユン：${rally.soyoonSkill1 || 0}</p>
        <p>リンセツ：${rally.rinsetsuSkill1 || 0}</p>
      </details>

      <details>
        <summary>🐾 ペット詳細を見る</summary>
        <p>${petSummary(p)}</p>
      </details>
    </div>
  `;
}

window.toggleSelect = function(id, checked){
  if(checked){
    selectedIds.add(id);
  }else{
    selectedIds.delete(id);
  }

  document.getElementById("selectedCount").textContent =
    "選択中：" + selectedIds.size + "人";
}

window.changeBox = async function(id, value){
  await updateDoc(
    doc(db,"svsResponses",id),
    {
      kingdomBox:value
    }
  );

  clearFirestoreCache("svsResponses");

  const target = svsData.find(x => x.id === id);
  if(target){
    target.kingdomBox = value;
  }

  applyFilters();
  renderBoxSummary();
}

window.bulkMove = async function(){
  if(selectedIds.size === 0){
    alert("移動する人を選択してください");
    return;
  }

  const box = document.getElementById("bulkBox").value;

  if(!confirm(selectedIds.size + "人を " + box + " に移動しますか？")){
    return;
  }

  for(const id of selectedIds){
    await updateDoc(
      doc(db,"svsResponses",id),
      {
        kingdomBox:box
      }
    );

    const target = svsData.find(x => x.id === id);
    if(target){
      target.kingdomBox = box;
    }
  }

  clearFirestoreCache("svsResponses");

  selectedIds.clear();
  document.getElementById("selectedCount").textContent = "選択中：0人";

  applyFilters();
  renderBoxSummary();

  alert("一括移動しました");
}

function renderBoxSummary(){
  const div = document.getElementById("boxSummary");
  let html = "";

  BOXES.forEach(box=>{
    const members = svsData.filter(x =>
      (x.kingdomBox || "未振り分け") === box
    );

    const countClass =
      box !== "未振り分け" && members.length >= 100
      ? "full"
      : "ok";

    const totalCapacity =
      members.reduce((sum,p)=>sum + getRallyCapacity(p),0);

    const canRallyCount =
      members.filter(p => getRally(p).canRally === "可能").length;

    const petMemberCount =
      members.filter(p => petsList(p).length > 0).length;

    html += `
      <div class="box-list">
        <h3>${box} <span class="${countClass}">(${members.length}${box==="未振り分け" ? "人" : "/100人"})</span></h3>
        <p>総集結容量：${totalCapacity.toLocaleString()}</p>
        <p>集結主可能：${canRallyCount}人</p>
        <p>ペット登録者：${petMemberCount}人</p>
        <p>
          ${
            members.length === 0
            ? "該当なし"
            : `<div class="box-member-list">` + members.map(x=>{
                const mark = x.status === "途中参加" ? "※" : "";
                const tier = getLowestTier(x);
                const rally = getRally(x);
                const crown = rally.canRally === "可能" ? "👑" : "";
                return `<span class="box-member-chip">${crown}${x.alliance || "-"} ${mark}${x.playerName || "-"} <strong>${tier}</strong></span>`;
              }).join("") + `</div>`
          }
        </p>
      </div>
    `;
  });

  div.innerHTML = html;
}

loadData();
</script>

</body>
</html>
