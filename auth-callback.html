<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Discord認証中</title>

<style>
body{
  margin:0;
  background:#071a2d;
  color:white;
  font-family:sans-serif;
  padding:20px;
}

.card{
  max-width:560px;
  margin:60px auto;
  background:#132b45;
  padding:25px;
  border-radius:14px;
  text-align:center;
}

h1{
  color:#00d4ff;
}

p{
  line-height:1.7;
  color:#ddd;
}

.error{
  color:#ff7777;
  font-weight:bold;
}

.ok{
  color:#66ff99;
  font-weight:bold;
}

a{
  display:block;
  margin-top:15px;
  padding:12px;
  border-radius:10px;
  background:#00d4ff;
  color:black;
  text-decoration:none;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="card">
  <h1>🔐 Discord認証中</h1>
  <p id="message">ログイン情報を確認しています...</p>
  <a href="login.html">ログイン画面へ戻る</a>
</div>

<script>
const ALLOWED_USERS = [
  /*
    ここにログインを許可するDiscordユーザーIDを追加してください。

    例：
    "123456789012345678",
    "987654321098765432"
  */
];

const DEFAULT_NEXT_PAGE = "box-admin.html";

function setMessage(text, className = ""){
  const el = document.getElementById("message");
  el.textContent = text;
  el.className = className;
}

function getAccessTokenFromHash(){
  const hash = location.hash.replace("#", "");

  if(!hash){
    return null;
  }

  const params = new URLSearchParams(hash);
  return params.get("access_token");
}

async function fetchDiscordUser(accessToken){
  const res = await fetch("https://discord.com/api/users/@me", {
    headers: {
      Authorization: "Bearer " + accessToken
    }
  });

  if(!res.ok){
    throw new Error("Discordユーザー情報の取得に失敗しました");
  }

  return await res.json();
}

async function main(){
  try{
    const accessToken = getAccessTokenFromHash();

    if(!accessToken){
      setMessage("認証情報が見つかりません。もう一度ログインしてください。", "error");
      return;
    }

    const user = await fetchDiscordUser(accessToken);

    if(!user || !user.id){
      setMessage("Discord IDを取得できませんでした。", "error");
      return;
    }

    if(ALLOWED_USERS.length > 0 && !ALLOWED_USERS.includes(user.id)){
      localStorage.removeItem("discord_access_token");
      localStorage.removeItem("discord_user_id");
      localStorage.removeItem("discord_username");

      setMessage("このDiscordアカウントには管理ページの権限がありません。", "error");
      return;
    }

    localStorage.setItem("discord_access_token", accessToken);
    localStorage.setItem("discord_user_id", user.id);
    localStorage.setItem("discord_username", user.username || "");

    setMessage("ログイン成功。管理ページへ移動します。", "ok");

    const nextPage =
      sessionStorage.getItem("nextPage") ||
      DEFAULT_NEXT_PAGE;

    sessionStorage.removeItem("nextPage");

    setTimeout(()=>{
      location.href = nextPage;
    }, 800);

  }catch(error){
    console.error(error);
    setMessage("ログイン処理でエラーが発生しました。もう一度ログインしてください。", "error");
  }
}

main();
</script>

</body>
</html>
